<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NI NO Pro | UK National Insurance Number Application – PayPal Payment</title>
<meta name="description" content="Professional NI Number application form with PayPal payment integration.">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #f0f4fa 0%, #e6edf4 100%); color: #0f172a; }
  .wrapper { max-width: 1000px; margin: 0 auto; padding: 40px 24px; }
  .header { text-align: center; margin-bottom: 40px; }
  .badge { background: rgba(30,58,95,0.12); display: inline-block; padding: 6px 18px; border-radius: 60px; font-size: 0.85rem; color: #1e3a5f; margin-bottom: 18px; }
  h1 { font-size: 2.4rem; font-weight: 800; background: linear-gradient(135deg, #0b2b44, #1e4a76); background-clip: text; -webkit-background-clip: text; color: transparent; }
  .subhead { color: #475569; text-align: center; margin-top: 10px; }
  .step-indicator { display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
  .step-indicator::before { content: ''; position: absolute; top: 24px; left: 10%; right: 10%; height: 2px; background: #e2e8f0; z-index: 0; }
  .step { text-align: center; z-index: 1; background: transparent; padding: 0 8px; }
  .step-circle { width: 48px; height: 48px; background: #f1f5f9; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; color: #64748b; margin: 0 auto 8px; }
  .step.active .step-circle { background: #1e3a5f; color: white; box-shadow: 0 0 0 3px rgba(30,58,95,0.2); }
  .step.completed .step-circle { background: #1e3a5f; color: white; }
  .step-label { font-size: 11px; font-weight: 600; color: #64748b; }
  .step.active .step-label { color: #1e3a5f; }
  .progress-bar { background: #e2e8f0; border-radius: 10px; height: 6px; margin-bottom: 30px; overflow: hidden; }
  .progress-fill { background: linear-gradient(90deg, #1e3a5f, #2c6290); width: 33%; height: 100%; transition: width 0.3s; }
  .form-card { background: white; border-radius: 32px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
  .form-section { margin-bottom: 32px; border-bottom: 1px solid #eef2f8; padding-bottom: 24px; }
  .section-title { font-size: 1rem; font-weight: 700; color: #1e3a5f; margin-bottom: 20px; background: #eef2ff; display: inline-block; padding: 4px 16px; border-radius: 30px; }
  .form-group { margin-bottom: 20px; }
  .form-group label { font-size: 13px; font-weight: 600; color: #0f172a; margin-bottom: 6px; display: block; }
  .required { color: #dc2626; }
  input, select { width: 100%; padding: 12px 14px; background: #f8fafc; border: 1.5px solid #e2edf7; border-radius: 14px; font-size: 14px; }
  input:focus, select:focus { outline: none; border-color: #1e3a5f; }
  .error-input { border-color: #dc2626 !important; background-color: #fef2f2 !important; }
  .error-message { color: #dc2626; font-size: 11px; margin-top: 4px; display: block; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .form-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
  .radio-group { display: flex; gap: 25px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .radio-card { display: flex; align-items: center; gap: 8px; background: #f9fbfe; padding: 8px 18px; border-radius: 100px; border: 1.5px solid #e2edf7; cursor: pointer; }
  .btn-group { display: flex; justify-content: space-between; gap: 16px; margin-top: 32px; }
  .btn-pro { padding: 12px 28px; border-radius: 50px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-primary { background: #1e3a5f; color: white; }
  .btn-primary:hover { background: #0f2b48; transform: translateY(-2px); }
  .btn-secondary { background: #f1f5f9; color: #475569; }
  .btn-payment { background: #0070ba; color: white; }
  .btn-payment:hover { background: #003087; transform: translateY(-2px); }
  .btn-payment:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .review-section { background: #f8fafc; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
  .review-row { display: flex; padding: 8px 0; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
  .review-label { width: 35%; font-weight: 600; }
  .form-page { display: none; }
  .form-page.active-page { display: block; }
  .payment-section { background: linear-gradient(135deg, #e8f4fd, #d4e8f7); border-radius: 24px; padding: 24px; margin: 20px 0; text-align: center; }
  .payment-amount { font-size: 28px; font-weight: 800; color: #0070ba; margin: 10px 0; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1e3a5f; color: white; padding: 12px 24px; border-radius: 50px; z-index: 1000; display: none; font-size: 14px; }
  .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid white; border-radius: 50%; border-top-color: transparent; animation: spin 0.6s linear infinite; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 680px) { .form-card { padding: 24px; } .form-row, .form-row-3 { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="wrapper">
  <div class="header">
    <div class="badge"><i class="fab fa-paypal"></i> NI NO · Premium Service</div>
    <h1>UK National Insurance Number Application</h1>
    <div class="subhead">Complete your application securely with PayPal</div>
  </div>

  <div class="step-indicator">
    <div class="step active"><div class="step-circle">1</div><div class="step-label">Personal</div></div>
    <div class="step"><div class="step-circle">2</div><div class="step-label">Nationality</div></div>
    <div class="step"><div class="step-circle">3</div><div class="step-label">Payment</div></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="form-card">
    <!-- PAGE 1 -->
    <div id="page1" class="form-page active-page">
      <div class="form-section">
        <div class="section-title">Personal Information</div>
        <div class="form-row">
          <div class="form-group"><label>Title <span class="required">*</span></label><select id="title"><option value="">Select</option><option>Mr</option><option>Mrs</option><option>Miss</option><option>Ms</option><option>Dr</option></select></div>
          <div class="form-group"><label>First Name <span class="required">*</span></label><input type="text" id="firstName" placeholder="Enter first name"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Last Name <span class="required">*</span></label><input type="text" id="lastName" placeholder="Enter last name"></div>
          <div class="form-group"><label>Gender <span class="required">*</span></label>
            <div class="radio-group"><label class="radio-card"><input type="radio" name="gender" value="Male"> Male</label><label class="radio-card"><input type="radio" name="gender" value="Female"> Female</label></div>
          </div>
        </div>
        <div class="form-row-3">
          <div class="form-group"><label>Day <span class="required">*</span></label><select id="dobDay"><option value="">DD</option><script>for(let i=1;i<=31;i++)document.write(`<option value="${i}">${i}</option>`);</script></select></div>
          <div class="form-group"><label>Month <span class="required">*</span></label><select id="dobMonth"><option value="">MM</option><script>for(let i=1;i<=12;i++)document.write(`<option value="${i}">${i}</option>`);</script></select></div>
          <div class="form-group"><label>Year <span class="required">*</span></label><select id="dobYear"><option value="">YYYY</option><script>for(let i=2005;i>=1920;i--)document.write(`<option value="${i}">${i}</option>`);</script></select></div>
        </div>
        <div class="form-group"><label>Marital Status <span class="required">*</span></label>
          <div class="radio-group"><label class="radio-card"><input type="radio" name="marital" value="Single"> Single</label><label class="radio-card"><input type="radio" name="marital" value="Married"> Married</label><label class="radio-card"><input type="radio" name="marital" value="Divorced"> Divorced</label></div>
        </div>
      </div>

      <div class="form-section">
        <div class="section-title">Contact & Address</div>
        <div class="form-row">
          <div class="form-group"><label>Email <span class="required">*</span></label><input type="email" id="email" placeholder="your@email.com"></div>
          <div class="form-group"><label>Confirm Email <span class="required">*</span></label><input type="email" id="confirmEmail" placeholder="Confirm email"></div>
        </div>
        <div class="form-group"><label>Phone Number <span class="required">*</span></label><input type="tel" id="phone" placeholder="07700 900123"></div>
        <div class="form-row">
          <div class="form-group"><label>House/Flat No. <span class="required">*</span></label><input type="text" id="houseNumber" placeholder="House number"></div>
          <div class="form-group"><label>Street Name <span class="required">*</span></label><input type="text" id="streetName" placeholder="Street name"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>City/Town <span class="required">*</span></label><input type="text" id="city" placeholder="City"></div>
          <div class="form-group"><label>Postcode <span class="required">*</span></label><input type="text" id="postcode" placeholder="Postcode"></div>
        </div>
        <div class="form-group"><label>Last Entry Date into UK <span class="required">*</span></label><input type="date" id="lastEntry"></div>
      </div>

      <div class="btn-group"><button class="btn-pro btn-primary" id="toPage2Btn">Continue →</button></div>
    </div>

    <!-- PAGE 2 -->
    <div id="page2" class="form-page">
      <div class="form-section">
        <div class="section-title">Nationality</div>
        <div class="form-group"><label>Nationality <span class="required">*</span></label>
          <select id="nationality"><option value="">Select Nationality</option><option>United Kingdom</option><option>India</option><option>USA</option><option>Canada</option><option>Australia</option><option>Pakistan</option><option>Bangladesh</option><option>Nigeria</option><option>Other</option></select>
          <input type="text" id="otherNationality" placeholder="Please specify" style="margin-top:8px; display:none;">
        </div>
      </div>

      <div class="form-section">
        <div class="section-title">Application Details</div>
        <div class="form-group"><label>Reason for applying? <span class="required">*</span></label>
          <select id="reason"><option value="">Please select</option><option value="work">Looking for work / Employment</option><option value="working">Already working</option><option value="student">Student needing NI</option><option value="benefits">Benefits / Universal Credit</option></select>
        </div>
        <div class="form-group"><label>Currently working? <span class="required">*</span></label>
          <div class="radio-group"><label class="radio-card"><input type="radio" name="working" value="Yes"> Yes</label><label class="radio-card"><input type="radio" name="working" value="No"> No</label></div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-group"><label><input type="checkbox" id="agreeTerms"> I agree to the Terms & Privacy Policy <span class="required">*</span></label></div>
      </div>

      <div class="btn-group"><button class="btn-pro btn-secondary" id="backToPage1Btn">← Back</button><button class="btn-pro btn-primary" id="gotoReviewBtn">Review Application →</button></div>
    </div>

    <!-- PAGE 3 -->
    <div id="page3" class="form-page">
      <div id="reviewContent"></div>
      <div class="payment-section">
        <i class="fab fa-paypal" style="font-size: 48px; color: #0070ba;"></i>
        <div class="payment-amount">£29.99</div>
        <p>Pay securely with PayPal • Credit/Debit cards accepted</p>
      </div>
      <div class="btn-group">
        <button class="btn-pro btn-secondary" id="backToPage2Btn">← Edit</button>
        <button class="btn-pro btn-payment" id="paymentSubmitBtn"><i class="fab fa-paypal"></i> Pay with PayPal →</button>
      </div>
    </div>
  </div>
</div>

<script>
  const PAYPAL_LINK = "https://www.paypal.com/ncp/payment/HSCDGHFW3BV3A";

  function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.backgroundColor = isError ? '#dc2626' : '#0070ba';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
  }

  function showError(group, msg) {
    const existing = group.querySelector('.error-message');
    if (existing) existing.remove();
    const err = document.createElement('div');
    err.className = 'error-message';
    err.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${msg}`;
    group.appendChild(err);
    const input = group.querySelector('input, select');
    if (input) input.classList.add('error-input');
  }

  function clearError(group) {
    const err = group.querySelector('.error-message');
    if (err) err.remove();
    const input = group.querySelector('input, select');
    if (input) input.classList.remove('error-input');
  }

  function validatePage1() {
    let valid = true;
    const groups = ['grp-title', 'grp-firstName', 'grp-lastName', 'grp-gender', 'grp-dobDay', 'grp-marital', 
                    'grp-email', 'grp-confirmEmail', 'grp-phone', 'grp-houseNumber', 'grp-streetName', 
                    'grp-city', 'grp-postcode', 'grp-lastEntry'];
    
    if (!document.getElementById('title').value) valid = false;
    if (!document.getElementById('firstName').value.trim()) valid = false;
    if (!document.getElementById('lastName').value.trim()) valid = false;
    if (!document.querySelector('input[name="gender"]:checked')) valid = false;
    if (!document.getElementById('dobDay').value || !document.getElementById('dobMonth').value || !document.getElementById('dobYear').value) valid = false;
    if (!document.querySelector('input[name="marital"]:checked')) valid = false;
    
    const email = document.getElementById('email').value.trim();
    const confirm = document.getElementById('confirmEmail').value.trim();
    if (!email || !/^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email)) valid = false;
    if (!confirm || email !== confirm) valid = false;
    
    if (!document.getElementById('phone').value.trim()) valid = false;
    if (!document.getElementById('houseNumber').value.trim()) valid = false;
    if (!document.getElementById('streetName').value.trim()) valid = false;
    if (!document.getElementById('city').value.trim()) valid = false;
    if (!document.getElementById('postcode').value.trim()) valid = false;
    if (!document.getElementById('lastEntry').value) valid = false;
    
    return valid;
  }

  function validatePage2() {
    let valid = true;
    if (!document.getElementById('nationality').value) valid = false;
    if (!document.getElementById('reason').value) valid = false;
    if (!document.querySelector('input[name="working"]:checked')) valid = false;
    if (!document.getElementById('agreeTerms').checked) valid = false;
    return valid;
  }

  let currentStep = 1;
  const page1 = document.getElementById('page1');
  const page2 = document.getElementById('page2');
  const page3 = document.getElementById('page3');
  const steps = document.querySelectorAll('.step');

  function updateProgress() {
    steps.forEach((step, idx) => {
      if (idx + 1 < currentStep) step.classList.add('completed');
      else step.classList.remove('completed');
      if (idx + 1 === currentStep) step.classList.add('active');
      else step.classList.remove('active');
    });
    document.getElementById('progressFill').style.width = currentStep === 1 ? '33%' : currentStep === 2 ? '66%' : '100%';
  }

  function showPage(page) {
    page1.classList.remove('active-page');
    page2.classList.remove('active-page');
    page3.classList.remove('active-page');
    if (page === 1) page1.classList.add('active-page');
    if (page === 2) page2.classList.add('active-page');
    if (page === 3) {
      const get = (id) => document.getElementById(id)?.value.trim() || '—';
      const nat = document.getElementById('nationality').value;
      const finalNat = nat === 'Other' ? document.getElementById('otherNationality').value : nat;
      document.getElementById('reviewContent').innerHTML = `
        <div class="review-section"><h3>Personal Details</h3>
          <div class="review-row"><div class="review-label">Name:</div><div>${get('title')} ${get('firstName')} ${get('lastName')}</div></div>
          <div class="review-row"><div class="review-label">DOB:</div><div>${get('dobDay')}/${get('dobMonth')}/${get('dobYear')}</div></div>
          <div class="review-row"><div class="review-label">Email:</div><div>${get('email')}</div></div>
          <div class="review-row"><div class="review-label">Phone:</div><div>${get('phone')}</div></div>
          <div class="review-row"><div class="review-label">Address:</div><div>${get('houseNumber')} ${get('streetName')}, ${get('city')}, ${get('postcode')}</div></div>
        </div>
        <div class="review-section"><h3>Application</h3>
          <div class="review-row"><div class="review-label">Nationality:</div><div>${finalNat}</div></div>
          <div class="review-row"><div class="review-label">Reason:</div><div>${document.getElementById('reason')?.options[document.getElementById('reason')?.selectedIndex]?.text || '—'}</div></div>
          <div class="review-row"><div class="review-label">Working:</div><div>${document.querySelector('input[name="working"]:checked')?.value || '—'}</div></div>
        </div>
      `;
      page3.classList.add('active-page');
    }
    currentStep = page;
    updateProgress();
    window.scrollTo({ top: 0 });
  }

  document.getElementById('nationality')?.addEventListener('change', function() {
    document.getElementById('otherNationality').style.display = this.value === 'Other' ? 'block' : 'none';
  });

  document.getElementById('toPage2Btn')?.addEventListener('click', () => { if (validatePage1()) showPage(2); else showToast('Please complete all required fields on this page', true); });
  document.getElementById('backToPage1Btn')?.addEventListener('click', () => showPage(1));
  document.getElementById('backToPage2Btn')?.addEventListener('click', () => showPage(2));
  document.getElementById('gotoReviewBtn')?.addEventListener('click', () => { if (validatePage2()) showPage(3); else showToast('Please complete all fields and agree to terms', true); });

  // ========== FIXED PAYMENT BUTTON ==========
  document.getElementById('paymentSubmitBtn')?.addEventListener('click', function(e) {
    e.preventDefault();
    
    // Check if terms are agreed
    if (!document.getElementById('agreeTerms').checked) {
      showToast('Please accept the terms and conditions on page 2', true);
      showPage(2);
      return;
    }
    
    const btn = this;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="loading"></span> Processing...';
    btn.disabled = true;
    
    // Get all form data
    const nationalityValue = document.getElementById('nationality').value;
    const finalNationality = nationalityValue === 'Other' ? document.getElementById('otherNationality').value : nationalityValue;
    
    const formData = {
      title: document.getElementById('title').value,
      firstName: document.getElementById('firstName').value,
      lastName: document.getElementById('lastName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      houseNumber: document.getElementById('houseNumber').value,
      streetName: document.getElementById('streetName').value,
      city: document.getElementById('city').value,
      postcode: document.getElementById('postcode').value,
      dobDay: document.getElementById('dobDay').value,
      dobMonth: document.getElementById('dobMonth').value,
      dobYear: document.getElementById('dobYear').value,
      nationality: finalNationality,
      reason: document.getElementById('reason').value,
      gender: document.querySelector('input[name="gender"]:checked')?.value,
      marital: document.querySelector('input[name="marital"]:checked')?.value,
      working: document.querySelector('input[name="working"]:checked')?.value,
      lastEntry: document.getElementById('lastEntry').value
    };
    
    // Save to localStorage for backup
    localStorage.setItem('ni_application_data', JSON.stringify(formData));
    
    showToast('Saving application...', false);
    
    // Try to save to backend (if API exists)
    fetch('/api/save-application', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(formData)
    })
    .then(response => response.json())
    .then(result => {
      if (result.success) {
        showToast('Application saved! Redirecting to PayPal...', false);
        setTimeout(() => {
          window.location.href = PAYPAL_LINK;
        }, 1500);
      } else {
        // Even if API fails, still redirect to PayPal
        console.log('API error but continuing to PayPal');
        showToast('Redirecting to PayPal...', false);
        setTimeout(() => {
          window.location.href = PAYPAL_LINK;
        }, 1000);
      }
    })
    .catch(error => {
      console.error('Error:', error);
      // Still redirect to PayPal even if backend fails
      showToast('Redirecting to PayPal payment...', false);
      setTimeout(() => {
        window.location.href = PAYPAL_LINK;
      }, 1000);
    });
  });

  // Auto-clear errors on input
  document.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', function() {
      const group = this.closest('.form-group');
      if (group) clearError(group);
    });
  });

  showPage(1);
</script>
</body>
</html>
